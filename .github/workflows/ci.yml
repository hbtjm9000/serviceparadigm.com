name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Type check
        run: bun run astro check

      - name: Lint
        run: bun run lint

      - name: Unit tests
        run: bun run test

      - name: Build
        run: bun run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v11
        with:
          urls: |
            http://localhost:4321/
            http://localhost:4321/about/
            http://localhost:4321/services/
            http://localhost:4321/contact/
          budgetPath: .lighthouseci/lighthouse-budget.json
          uploadArtifacts: true
          temporaryPublicStorage: true

  links:
    name: Check Links
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Run preview server
        run: bun run preview &
        env:
          PORT: 4321

      - name: Wait for preview
        run: npx --yes wait-on http://localhost:4321 --timeout 30000

      - name: Check links with lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: --verbose http://localhost:4321/
          fail: true

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Build
        run: bun run build

      - name: Run E2E tests
        run: bun run preview --port 4321 & sleep 5 && bunx playwright test && kill %1
