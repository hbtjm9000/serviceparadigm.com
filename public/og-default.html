<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OG Image</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1200px;
      height: 630px;
      background: #0d486c;
      font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      position: relative;
      overflow: hidden;
    }
    
    /* Abstract background pattern */
    body::before {
      content: '';
      position: absolute;
      top: -200px;
      right: -200px;
      width: 800px;
      height: 800px;
      background: radial-gradient(circle, rgba(28,220,217,0.15) 0%, transparent 70%);
      border-radius: 50%;
    }
    body::after {
      content: '';
      position: absolute;
      bottom: -300px;
      left: -200px;
      width: 900px;
      height: 900px;
      background: radial-gradient(circle, rgba(163,57,0,0.2) 0%, transparent 60%);
      border-radius: 50%;
    }
    
    .logo-mark {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #1cdcd9 0%, #006a68 100%);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      font-weight: 700;
      color: #0d486c;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      position: absolute;
      top: 50px;
      left: 60px;
    }
    
    .content {
      text-align: center;
      z-index: 1;
    }
    
    .tagline {
      font-size: 18px;
      font-weight: 500;
      color: #1cdcd9;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin-bottom: 24px;
    }
    
    .company {
      font-size: 72px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: -0.02em;
      margin-bottom: 16px;
    }
    
    .slash {
      font-size: 72px;
      font-weight: 300;
      color: #a33900;
      margin: 0 8px;
    }
    
    .tagline2 {
      font-size: 32px;
      font-weight: 400;
      color: rgba(255,255,255,0.7);
      letter-spacing: 0.02em;
    }
    
    .divider {
      width: 120px;
      height: 4px;
      background: linear-gradient(90deg, #a33900, #1cdcd9);
      border-radius: 2px;
      margin: 32px auto 0;
    }
    
    .url {
      position: absolute;
      bottom: 50px;
      right: 60px;
      font-size: 16px;
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <div class="logo-mark">P</div>
  <div class="content">
    <div class="tagline">Engineering the Next Paradigm</div>
    <div class="company">
      Paradigm <span class="slash">/</span> IT
    </div>
    <div class="tagline2">Elite Technology Advisory</div>
    <div class="divider"></div>
  </div>
  <div class="url">serviceparadigm.com</div>
</body>
</html>
